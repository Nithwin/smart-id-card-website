<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer card frame -->
  <rect x="6" y="14" width="52" height="36" rx="6" stroke="currentColor" stroke-width="3"/>

  <!-- Photo block -->
  <rect x="13" y="22" width="14" height="20" rx="2" fill="currentColor"/>

  <!-- Text lines -->
  <rect x="32" y="24" width="20" height="2.5" rx="1.25" fill="currentColor"/>
  <rect x="32" y="30" width="14" height="2.5" rx="1.25" fill="currentColor" opacity="0.65"/>
  <rect x="32" y="36" width="18" height="2.5" rx="1.25" fill="currentColor" opacity="0.45"/>

  <!-- Scan line -->
  <line x1="3" y1="32" x2="61" y2="32" stroke="currentColor" stroke-width="1" stroke-dasharray="2 3" opacity="0.7"/>

  <!-- Corner accent dot -->
  <circle cx="55" cy="11" r="2.5" fill="currentColor"/>
</svg>
